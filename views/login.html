<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Guru Glass</title>
  <link rel="stylesheet" href="/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔷</text></svg>">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-mark">🔷</div>
      <h1>Guru Glass</h1>
      <div class="subtitle">Admin Portal</div>
    </div>

    <div id="loginError" class="login-error">
      Invalid username or password. Please try again.
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username"
               placeholder="admin" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="••••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn btn-primary" id="loginBtn"
              style="width:100%;justify-content:center;margin-top:8px;padding:12px">
        Sign In
      </button>
    </form>

    <div style="text-align:center;margin-top:24px">
      <a href="/" style="font-size:0.8rem;color:var(--text-muted)">← Back to website</a>
    </div>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    err.classList.remove('show');

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = '/admin';
      } else {
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch (error) {
      err.textContent = 'Network error. Please try again.';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
